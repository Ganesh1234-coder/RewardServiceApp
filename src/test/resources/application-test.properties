# --- H2 in-memory for tests ---
spring.datasource.url=jdbc:h2:mem:rewardsdb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA/Hibernate ---
# Let Hibernate create/drop schema from your entities for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Use the same naming strategy you set in prod to avoid column mismatches
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Don't run schema.sql/data.sql in tests (we will insert programmatically)
spring.sql.init.mode=never

# Web server on random port for end-to-end test
server.port=0